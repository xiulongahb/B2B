spring:
  datasource:
    url: jdbc:h2:mem:b2b_test;DB_CLOSE_DELAY=-1;MODE=MySQL;DATABASE_TO_LOWER=TRUE
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: create-drop
    database-platform: org.hibernate.dialect.H2Dialect

b2b:
  jwt:
    secret: "test-secret-key-at-least-32-bytes-long!!"
  mall:
    sms:
      dev-expose-code-in-response: true
      resend-interval-seconds: 1
