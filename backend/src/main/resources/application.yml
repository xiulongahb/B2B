spring:
  application:
    name: b2b-platform
  datasource:
    url: jdbc:mysql://localhost:3306/b2b_mall?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai&useSSL=false&allowPublicKeyRetrieval=true
    username: ${MYSQL_USER:root}
    password: ${MYSQL_PASSWORD:root}
    driver-class-name: com.mysql.cj.jdbc.Driver
  h2:
    console:
      enabled: false
  jpa:
    hibernate:
      ddl-auto: update
    open-in-view: false
    database-platform: org.hibernate.dialect.MySQL8Dialect
    properties:
      hibernate:
        format_sql: true

server:
  port: 8080

b2b:
  jwt:
    secret: "b2b-dev-secret-change-me-use-at-least-32-chars!!"
    expiration-ms: 604800000
  mall:
    sms:
      code-length: 6
      code-ttl-seconds: 300
      resend-interval-seconds: 60
      dev-expose-code-in-response: false
