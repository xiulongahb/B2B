spring:
  application:
    name: b2b-platform
  datasource:
    url: jdbc:h2:mem:b2b;DB_CLOSE_DELAY=-1;MODE=MySQL;DATABASE_TO_LOWER=TRUE;DEFAULT_NULL_ORDERING=HIGH
    driver-class-name: org.h2.Driver
    username: sa
    password:
  h2:
    console:
      enabled: false
  jpa:
    hibernate:
      ddl-auto: update
    open-in-view: false
    properties:
      hibernate:
        format_sql: true

server:
  port: 8080

b2b:
  jwt:
    secret: "b2b-dev-secret-change-me-use-at-least-32-chars!!"
    expiration-ms: 604800000
  mall:
    sms:
      code-length: 6
      code-ttl-seconds: 300
      resend-interval-seconds: 60
      dev-expose-code-in-response: false
