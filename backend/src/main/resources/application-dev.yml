# 无 MySQL 时使用：mvn spring-boot:run -Dspring-boot.run.profiles=dev
spring:
  datasource:
    url: jdbc:h2:mem:b2b;DB_CLOSE_DELAY=-1;MODE=MySQL;DATABASE_TO_LOWER=TRUE;DEFAULT_NULL_ORDERING=HIGH
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    database-platform: org.hibernate.dialect.H2Dialect

# 开发环境：短信走日志模拟，并在发码接口返回验证码便于联调（切勿用于生产）
b2b:
  mall:
    sms:
      dev-expose-code-in-response: true

logging:
  level:
    com.b2b: DEBUG
