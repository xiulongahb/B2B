<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>PC 商城 · 商品列表</title>
  <style>
    body { font-family: system-ui, sans-serif; max-width: 960px; margin: 24px auto; padding: 0 16px; }
    h1 { font-size: 1.25rem; }
    .bar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px; flex-wrap: wrap; gap: 8px; }
    .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 12px; }
    .card { border: 1px solid #ddd; border-radius: 8px; padding: 12px; }
    .price { color: #c00; font-weight: 600; }
    a { color: #06c; }
    code { background: #f4f4f4; padding: 2px 6px; border-radius: 4px; }
  </style>
</head>
<body>
  <div class="bar">
    <h1>商品列表（阶段 A MVP）</h1>
    <div>
      <a href="/mall/index.html">经销商登录</a>
      ·
      <a href="/shop/cart.html">购物车</a>
      <span id="tokenHint"></span>
    </div>
  </div>
  <p style="color:#666;font-size:14px;">公开接口 <code>GET /api/mall/products</code>。加入购物车需先在 <a href="/mall/index.html">经销商登录</a> 获取令牌。</p>
  <div id="list" class="grid"></div>
  <p id="err" style="color:red;"></p>
  <script>
    var API = "";
    function token() { return sessionStorage.getItem("mall_access_token"); }
    document.getElementById("tokenHint").textContent = token() ? "（已登录）" : "（未登录）";
    fetch(API + "/api/mall/products?size=50")
      .then(function (r) { return r.json(); })
      .then(function (page) {
        var list = document.getElementById("list");
        (page.content || []).forEach(function (p) {
          var d = document.createElement("div");
          d.className = "card";
          d.innerHTML = "<div><strong>" + (p.name || "") + "</strong></div>" +
            "<div class=\"price\">¥" + (p.price || "") + "</div>" +
            "<div style=\"font-size:12px;color:#666;margin-top:8px;\">库存 " + (p.stock || 0) + "</div>" +
            "<div style=\"margin-top:8px;\"><button data-id=\"" + p.id + "\">加入购物车</button></div>";
          list.appendChild(d);
        });
        list.onclick = function (e) {
          if (e.target.tagName !== "BUTTON") return;
          var id = e.target.getAttribute("data-id");
          if (!token()) { alert("请先登录经销商账号"); location.href = "/mall/index.html"; return; }
          fetch(API + "/api/mall/cart/items", {
            method: "POST",
            headers: { "Content-Type": "application/json", Authorization: "Bearer " + token() },
            body: JSON.stringify({ productId: Number(id), quantity: 1 })
          }).then(function (r) {
            if (!r.ok) return r.json().then(function (j) { throw new Error(j.message || r.status); });
            alert("已加入购物车");
            location.href = "/shop/cart.html";
          }).catch(function (e) { alert(e.message || "失败"); });
        };
      })
      .catch(function () { document.getElementById("err").textContent = "加载失败，请确认后端已启动。"; });
  </script>
</body>
</html>
