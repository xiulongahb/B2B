<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>经销商注册 / 登录 · B2B 商城</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg: #0c1222;
      --panel: rgba(22, 30, 50, 0.85);
      --border: rgba(255, 255, 255, 0.08);
      --text: #e8ecf4;
      --muted: #8b95a8;
      --accent: #3d8bfd;
      --accent-dim: #2563c9;
      --success: #34d399;
      --danger: #f87171;
      --radius: 14px;
      --shadow: 0 24px 80px rgba(0, 0, 0, 0.45);
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      font-family: "DM Sans", "PingFang SC", "Microsoft YaHei", sans-serif;
      background: var(--bg);
      color: var(--text);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      position: relative;
      overflow-x: hidden;
    }
    body::before {
      content: "";
      position: fixed;
      inset: -40%;
      background:
        radial-gradient(ellipse 50% 40% at 20% 20%, rgba(61, 139, 253, 0.18), transparent 55%),
        radial-gradient(ellipse 45% 35% at 85% 75%, rgba(52, 211, 153, 0.1), transparent 50%),
        radial-gradient(circle at 50% 100%, rgba(37, 99, 201, 0.15), transparent 45%);
      pointer-events: none;
      z-index: 0;
    }
    .card {
      position: relative;
      z-index: 1;
      width: 100%;
      max-width: 440px;
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: calc(var(--radius) + 4px);
      box-shadow: var(--shadow);
      backdrop-filter: blur(16px);
      padding: 36px 32px 32px;
    }
    .brand { display: flex; align-items: center; gap: 14px; margin-bottom: 6px; }
    .logo {
      width: 44px;
      height: 44px;
      border-radius: 12px;
      background: linear-gradient(135deg, var(--accent), #6366f1);
      display: grid;
      place-items: center;
      font-weight: 700;
      font-size: 18px;
    }
    h1 { margin: 0; font-size: 1.35rem; font-weight: 600; }
    .subtitle {
      margin: 8px 0 20px;
      font-size: 0.88rem;
      color: var(--muted);
      line-height: 1.5;
    }
    .tabs {
      display: flex;
      gap: 6px;
      margin-bottom: 22px;
      padding: 4px;
      background: rgba(0, 0, 0, 0.35);
      border-radius: var(--radius);
      border: 1px solid var(--border);
    }
    .tabs button.tab {
      flex: 1;
      padding: 10px 8px;
      font-size: 0.88rem;
      font-weight: 600;
      letter-spacing: -0.02em;
      background: transparent;
      color: var(--muted);
      border: none;
      border-radius: var(--radius);
      cursor: pointer;
    }
    .tabs button.tab.active {
      background: rgba(61, 139, 253, 0.25);
      color: var(--text);
      box-shadow: inset 0 0 0 1px rgba(61, 139, 253, 0.35);
    }
    .panel { display: none; }
    .panel.active { display: block; }
    label {
      display: block;
      font-size: 0.78rem;
      font-weight: 500;
      color: var(--muted);
      margin-bottom: 8px;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }
    .field { margin-bottom: 16px; }
    input {
      width: 100%;
      padding: 13px 14px;
      font-size: 1rem;
      font-family: inherit;
      color: var(--text);
      background: rgba(0, 0, 0, 0.25);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
    }
    input:focus {
      border-color: rgba(61, 139, 253, 0.55);
      box-shadow: 0 0 0 3px rgba(61, 139, 253, 0.15);
    }
    .row { display: flex; gap: 10px; }
    .row input { flex: 1; }
    button.primary {
      width: 100%;
      margin-top: 6px;
      padding: 14px;
      font-family: inherit;
      font-weight: 600;
      font-size: 0.95rem;
      cursor: pointer;
      border: none;
      border-radius: var(--radius);
      background: linear-gradient(135deg, var(--accent), var(--accent-dim));
      color: #fff;
      box-shadow: 0 8px 24px rgba(61, 139, 253, 0.35);
    }
    button.primary:disabled { opacity: 0.45; cursor: not-allowed; }
    button.primary:not(:disabled):hover { filter: brightness(1.06); }
    button.send {
      flex-shrink: 0;
      padding: 0 16px;
      font-family: inherit;
      font-weight: 600;
      font-size: 0.85rem;
      cursor: pointer;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      background: rgba(255, 255, 255, 0.08);
      color: var(--text);
      white-space: nowrap;
    }
    button.send:disabled { opacity: 0.45; cursor: not-allowed; }
    .msg {
      min-height: 22px;
      margin-top: 12px;
      font-size: 0.86rem;
      line-height: 1.45;
    }
    .msg.error { color: var(--danger); }
    .msg.ok { color: var(--success); }
    .msg.hint { color: var(--muted); font-size: 0.82rem; }
    .footer {
      margin-top: 22px;
      padding-top: 18px;
      border-top: 1px solid var(--border);
      font-size: 0.78rem;
      color: var(--muted);
      line-height: 1.5;
    }
    code { font-size: 0.85em; background: rgba(0, 0, 0, 0.35); padding: 2px 8px; border-radius: 6px; }
  </style>
</head>
<body>
  <div class="card">
    <div class="brand">
      <div class="logo">B2</div>
      <div><h1>经销商注册 / 登录</h1></div>
    </div>
    <p class="subtitle">支持用户名密码登录、手机验证码登录；注册需先获取短信验证码。密码需 8 位以上且含大小写字母与数字。开发环境发码接口会返回 <code>debugCode</code>。</p>

    <div class="tabs" role="tablist">
      <button type="button" class="tab active" data-tab="pwd">密码登录</button>
      <button type="button" class="tab" data-tab="sms">短信登录</button>
      <button type="button" class="tab" data-tab="reg">注册</button>
    </div>

    <div id="panel-pwd" class="panel active">
      <form id="form-pwd">
        <div class="field">
          <label for="pwd-username">用户名</label>
          <input id="pwd-username" type="text" autocomplete="username" placeholder="4-32 位字母数字下划线" />
        </div>
        <div class="field">
          <label for="pwd-password">密码</label>
          <input id="pwd-password" type="password" autocomplete="current-password" placeholder="含大小写与数字" />
        </div>
        <button type="submit" class="primary" id="btn-pwd">登录</button>
      </form>
    </div>

    <div id="panel-sms" class="panel">
      <form id="form-sms">
        <div class="field">
          <label for="sms-phone">手机号</label>
          <input id="sms-phone" type="tel" inputmode="numeric" maxlength="11" autocomplete="tel" placeholder="11 位手机号" />
        </div>
        <div class="field">
          <label for="sms-code">验证码</label>
          <div class="row">
            <input id="sms-code" type="text" inputmode="numeric" maxlength="8" autocomplete="one-time-code" placeholder="6 位验证码" />
            <button type="button" class="send" id="btn-send-sms">获取验证码</button>
          </div>
        </div>
        <button type="submit" class="primary" id="btn-sms-login">登录</button>
      </form>
    </div>

    <div id="panel-reg" class="panel">
      <form id="form-reg">
        <div class="field">
          <label for="reg-username">用户名</label>
          <input id="reg-username" type="text" autocomplete="username" placeholder="4-32 位字母数字下划线" />
        </div>
        <div class="field">
          <label for="reg-password">密码</label>
          <input id="reg-password" type="password" autocomplete="new-password" placeholder="8 位以上，含大小写与数字" />
        </div>
        <div class="field">
          <label for="reg-phone">手机号</label>
          <input id="reg-phone" type="tel" inputmode="numeric" maxlength="11" autocomplete="tel" />
        </div>
        <div class="field">
          <label for="reg-code">验证码</label>
          <div class="row">
            <input id="reg-code" type="text" inputmode="numeric" maxlength="8" placeholder="6 位验证码" />
            <button type="button" class="send" id="btn-send-reg">获取验证码</button>
          </div>
        </div>
        <button type="submit" class="primary" id="btn-reg">注册</button>
      </form>
    </div>

    <div class="msg" id="msg" aria-live="polite"></div>

    <div class="footer">
      <p style="margin:0 0 10px;">
        <a href="/shop/index.html" style="color:var(--accent);">商城选购</a>
        · <a href="/shop/cart.html" style="color:var(--accent);">购物车</a>
        · <a href="/shop/orders.html" style="color:var(--accent);">我的订单</a>
        · <a href="/admin/index.html" style="color:var(--muted);">运营端</a>
        · <a href="/supplier/index.html" style="color:var(--muted);">供应商端</a>
      </p>
      登录成功后令牌保存在 <code>sessionStorage</code>（<code>mall_access_token</code> 等）。数据默认写入 MySQL，本地无库可改用 <code>dev</code> 配置（H2）。
    </div>
  </div>

  <script>
    (function () {
      var API = "";

      var msgEl = document.getElementById("msg");
      var tabs = document.querySelectorAll(".tabs .tab");
      var panels = {
        pwd: document.getElementById("panel-pwd"),
        sms: document.getElementById("panel-sms"),
        reg: document.getElementById("panel-reg"),
      };

      function setMsg(text, type) {
        msgEl.textContent = text || "";
        msgEl.className = "msg" + (type ? " " + type : "");
      }

      function parseJson(res) {
        return res.text().then(function (t) {
          if (!t) return null;
          try { return JSON.parse(t); } catch (e) { return { _raw: t }; }
        });
      }

      function startCountdown(btn, sec) {
        var left = sec;
        btn.disabled = true;
        function tick() {
          btn.textContent = left > 0 ? left + "s" : "获取验证码";
          if (left <= 0) {
            clearInterval(timer);
            btn.disabled = false;
            return;
          }
          left--;
        }
        tick();
        var timer = setInterval(tick, 1000);
      }

      tabs.forEach(function (t) {
        t.addEventListener("click", function () {
          var tab = t.getAttribute("data-tab");
          tabs.forEach(function (x) { x.classList.toggle("active", x === t); });
          Object.keys(panels).forEach(function (k) {
            panels[k].classList.toggle("active", k === tab);
          });
          setMsg("", "");
        });
      });

      function bindSend(btn, phoneInput) {
        btn.addEventListener("click", function () {
          var phone = (phoneInput.value || "").replace(/\s/g, "");
          if (!/^1[3-9]\d{9}$/.test(phone)) {
            setMsg("请输入正确的 11 位手机号。", "error");
            return;
          }
          setMsg("正在发送…", "hint");
          btn.disabled = true;
          fetch(API + "/api/mall/auth/sms/send", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ phone: phone }),
          })
            .then(function (res) {
              return parseJson(res).then(function (data) {
                return { res: res, data: data };
              });
            })
            .then(function (o) {
              if (!o.res.ok) {
                setMsg((o.data && o.data.message) || "发送失败", "error");
                btn.disabled = false;
                return;
              }
              var hint = (o.data && o.data.message) || "验证码已发送";
              if (o.data && o.data.debugCode) {
                hint += "（开发环境验证码：" + o.data.debugCode + "）";
              }
              setMsg(hint, "ok");
              startCountdown(btn, 60);
            })
            .catch(function () {
              setMsg("网络异常。", "error");
              btn.disabled = false;
            });
        });
      }

      bindSend(document.getElementById("btn-send-sms"), document.getElementById("sms-phone"));
      bindSend(document.getElementById("btn-send-reg"), document.getElementById("reg-phone"));

      function saveSession(data) {
        if (data.accessToken) {
          sessionStorage.setItem("mall_access_token", data.accessToken);
          sessionStorage.setItem("mall_member_id", String(data.memberId || ""));
          sessionStorage.setItem("mall_phone", data.phone || "");
          sessionStorage.setItem("mall_username", data.username || "");
        }
      }

      document.getElementById("form-pwd").addEventListener("submit", function (e) {
        e.preventDefault();
        var username = (document.getElementById("pwd-username").value || "").trim();
        var password = document.getElementById("pwd-password").value || "";
        if (!username || !password) {
          setMsg("请输入用户名和密码。", "error");
          return;
        }
        setMsg("登录中…", "hint");
        fetch(API + "/api/mall/auth/password/login", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ username: username, password: password }),
        })
          .then(function (res) {
            return parseJson(res).then(function (data) { return { res: res, data: data }; });
          })
          .then(function (_ref) {
            var res = _ref.res;
            var data = _ref.data;
            if (!res.ok) {
              setMsg((data && data.message) || "登录失败", "error");
              return;
            }
            saveSession(data);
            setMsg("登录成功 · " + (data.username || username), "ok");
          })
          .catch(function () { setMsg("网络异常。", "error"); });
      });

      document.getElementById("form-sms").addEventListener("submit", function (e) {
        e.preventDefault();
        var phone = (document.getElementById("sms-phone").value || "").replace(/\s/g, "");
        var code = (document.getElementById("sms-code").value || "").trim();
        if (!/^1[3-9]\d{9}$/.test(phone)) {
          setMsg("请输入正确手机号。", "error");
          return;
        }
        if (!code) {
          setMsg("请输入验证码。", "error");
          return;
        }
        setMsg("登录中…", "hint");
        fetch(API + "/api/mall/auth/sms/login", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ phone: phone, code: code }),
        })
          .then(function (res) {
            return parseJson(res).then(function (data) { return { res: res, data: data }; });
          })
          .then(function (_ref) {
            var res = _ref.res;
            var data = _ref.data;
            if (!res.ok) {
              setMsg((data && data.message) || "登录失败", "error");
              return;
            }
            saveSession(data);
            setMsg("登录成功 · " + (data.username || phone), "ok");
          })
          .catch(function () { setMsg("网络异常。", "error"); });
      });

      document.getElementById("form-reg").addEventListener("submit", function (e) {
        e.preventDefault();
        var username = (document.getElementById("reg-username").value || "").trim();
        var password = document.getElementById("reg-password").value || "";
        var phone = (document.getElementById("reg-phone").value || "").replace(/\s/g, "");
        var smsCode = (document.getElementById("reg-code").value || "").trim();
        if (!username || !password || !/^1[3-9]\d{9}$/.test(phone) || !smsCode) {
          setMsg("请完整填写用户名、密码、手机号与验证码。", "error");
          return;
        }
        setMsg("提交注册…", "hint");
        fetch(API + "/api/mall/auth/register", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({
            username: username,
            password: password,
            phone: phone,
            smsCode: smsCode,
          }),
        })
          .then(function (res) {
            return parseJson(res).then(function (data) { return { res: res, data: data }; });
          })
          .then(function (_ref) {
            var res = _ref.res;
            var data = _ref.data;
            if (!res.ok) {
              setMsg((data && data.message) || "注册失败", "error");
              return;
            }
            saveSession(data);
            setMsg("注册成功，已自动登录。", "ok");
          })
          .catch(function () { setMsg("网络异常。", "error"); });
      });
    })();
  </script>
</body>
</html>
